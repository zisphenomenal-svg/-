<!doctype html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"
    name="keywords" content>="أتلتيكو مدريد, سيميوني ابويا, أساطير الأتليتي, توريس, جودين, كوكي, أوبلاك, زياد">
    <title>أتلتيكو مدريد | سيميوني أبويا</title>
    <style>
        /* تنسيق الألوان (أحمر وأبيض الأزرق الأتلتي) */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #CB3524 50%, #ffffff 50%);
            background-attachment: fixed;
            color: #333;
        }

        header {
            background-color: #1A2F54; /* لون أتلتيكو الأزرق الداكن */
            color: white;
            text-align: center;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 15px;
        }

        h1 { margin-bottom: 10px; font-weight: bold; }

        /* تنسيق شبكة الصور (Grid) */
        .legends-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .legend-card {
            background: white;
            border: 3px solid #CB3524;
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .legend-card:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* تنسيق الصورة */
        .legend-photo {
            width: 100%;
            height: 250px; /* طول موحد للصور */
            object-fit: cover; /* لضمان عدم تمدد الصورة */
            border-radius: 5px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
        }

        .legend-name {
            font-weight: bold;
            font-size: 1.2em;
            color: #1A2F54;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<header>
    <h1>سيميوني أبوك ❤️🤍💙</h1>
    <p>أساطير صناعة التاريخ في اتليتكو مدريد</p>
</header>

<div class="container">
    <h2 style="text-align: center; color: #CB3524; font-weight: bold;">معرض أساطير الأتليتي</h2>
    
    <div class="legends-grid">
        
        <div class="legend-card">
            <img src="simeone.jpg" alt="دييغو سيميوني" class="legend-photo">
            <div class="legend-name"> سيميوني </div>
        </div>

        <div class="legend-card">
            <img src="torres.jpg" alt="فرناندو توريس" class="legend-photo">
            <div class="legend-name"> توريس</div>
        </div>

        <div class="legend-card">
            <img src="godin.jpg" alt="دييغو جودين" class="legend-photo">
            <div class="legend-name"> جودين</div>
        </div>

        <div class="legend-card">
            <img src="koke.jpg" alt="كوكي" class="legend-photo">
            <div class="legend-name">كوكي </div>
        </div>

        <div class="legend-card">
            <img src="oblak.jpg" alt="يان أوبلاك" class="legend-photo">
            <div class="legend-name">أوبلاك</div>
        </div>

        <div class="legend-card">
            <img src="Ziyad.jpg" alt="زياد" class="legend-photo">
            <div class="legend-name">زياد</div>
        </div>

    </div>
</div>

</body>
</html>
